<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Atividade 4 - Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <main class="container py-4">
        <h1 class="mb-4">Alunos</h1>

        <div id="alerta" class="alert d-none" role="alert"></div>

        <section id="lista" class="mb-4">
            <h2>Lista de alunos</h2>

            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>RA</th>
                            <th>Nome</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAlunos">
                        <tr>
                            <td colspan="3" class="text-center py-4">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div class="row g-4">
            <section id="detalhes" class="col-lg-5">
                <div class="border p-3 h-100">
                    <h2>Detalhes do aluno</h2>
                    <dl class="row mb-3">
                        <dt class="col-4">RA</dt>
                        <dd id="detalheRa" class="col-8">-</dd>
                        <dt class="col-4">Nome</dt>
                        <dd id="detalheNome" class="col-8">-</dd>
                        <dt class="col-4">Disciplinas</dt>
                        <dd id="detalheQtd" class="col-8">-</dd>
                    </dl>
                    <h3>Resumo das disciplinas</h3>
                    <ul id="listaResumoDisciplinas" class="list-group list-group-flush"></ul>
                </div>
            </section>

            <section id="disciplinas" class="col-lg-7">
                <div class="border p-3 h-100">
                    <h2>Disciplinas do aluno</h2>
                    <p id="disciplinasRa">RA -</p>
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead>
                                <tr>
                                    <th>Codigo</th>
                                    <th>Nome</th>
                                    <th>Professor</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaDisciplinas"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>

        <section id="edicao" class="mt-4">
            <form id="formAluno" class="border p-3">
                <h2>Editar aluno</h2>

                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label for="editRa" class="form-label">RA</label>
                        <input id="editRa" class="form-control" type="text" readonly>
                    </div>
                    <div class="col-md-9">
                        <label for="editNome" class="form-label">Nome</label>
                        <input id="editNome" class="form-control" type="text" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="mb-0">Lista de disciplinas</h3>
                    <button id="btnAdicionarDisciplina" class="btn btn-outline-success btn-sm" type="button">
                        Adicionar
                    </button>
                </div>

                <div id="camposDisciplinas" class="vstack gap-2"></div>

                <button class="btn btn-primary mt-3" type="submit">Salvar</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
